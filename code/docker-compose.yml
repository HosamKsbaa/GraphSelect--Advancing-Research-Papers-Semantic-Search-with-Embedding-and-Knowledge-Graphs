services:
  # --- Angular Frontend (nginx) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alrs-frontend
    ports:
      - "4200:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # --- FastAPI Backend ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alrs-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      neo4j:
        condition: service_healthy
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # --- Neo4j Graph Database ---
  neo4j:
    image: neo4j:5-community
    container_name: alrs-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
      - NEO4J_PLUGINS=["graph-data-science"]
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  # --- MySQL Relational Database ---
  mysql:
    image: mysql:8.0
    container_name: alrs-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD:-changeme}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-alrs}
      - MYSQL_USER=${MYSQL_USER:-alrs}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-changeme}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  mysql_data:
